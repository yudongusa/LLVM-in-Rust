name: Fuzzing (LLVM-Stress + CSmith)

on:
  workflow_dispatch:
    inputs:
      csmith_count:
        description: "Number of CSmith programs to run"
        required: false
        default: "1000"
  schedule:
    - cron: "0 6 * * *"

jobs:
  llvm_stress_fuzz:
    name: LLVM-Stress parser/optimizer/codegen fuzz
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install nightly
          rustup default nightly

      - name: Install cargo-fuzz
        run: cargo +nightly install cargo-fuzz --locked

      - name: Install LLVM 19 tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y llvm-19 clang-19
          sudo update-alternatives --install /usr/bin/llvm-stress llvm-stress \
            /usr/lib/llvm-19/bin/llvm-stress 100
          llvm-stress --version

      - name: Seed 10k llvm-stress corpus and fuzz for 5m
        id: llvm_stress_fuzz
        # Nightly scheduled fuzzing should keep running and upload artifacts even when libFuzzer finds timeouts/crashes.
        continue-on-error: ${{ github.event_name == 'schedule' }}
        run: ./scripts/llvm_stress_fuzz.sh --iterations 10000 --max-total-time 300

      - name: Upload fuzz artifacts on failure
        if: ${{ failure() || steps.llvm_stress_fuzz.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: llvm-stress-fuzz-artifacts-${{ github.run_id }}
          path: |
            fuzz/artifacts/**
            fuzz/corpus/**
          if-no-files-found: warn
          retention-days: 14

  csmith_semantic:
    name: CSmith semantic differential (1k cases)
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable

      - name: Install CSmith + Clang 19
        run: |
          sudo apt-get update -y
          sudo apt-get install -y csmith clang-19
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-19 100
          csmith --version
          clang --version

      - name: Run CSmith integration script
        env:
          COUNT: ${{ github.event.inputs.csmith_count || '1000' }}
        run: ./scripts/csmith_test.sh --count "$COUNT"
