name: Require Issue Reference in PR

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

jobs:
  require_issue_reference:
    name: PR body must reference an issue
    runs-on: ubuntu-24.04
    steps:
      - name: Validate PR body contains issue reference
        uses: actions/github-script@v7
        with:
          script: |
            const body = (context.payload.pull_request.body || "").toLowerCase();
            const patterns = [
              /(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#\d+/i,
              /(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+https:\/\/github\.com\/[\w.-]+\/[\w.-]+\/issues\/\d+/i,
              /refs?\s+#\d+/i,
              /refs?\s+https:\/\/github\.com\/[\w.-]+\/[\w.-]+\/issues\/\d+/i,
            ];

            const ok = patterns.some((re) => re.test(body));
            if (!ok) {
              core.setFailed(
                "PR must reference a GitHub issue in the body (e.g. `Closes #123`, `Fixes #123`, or `Refs #123`)."
              );
            }
