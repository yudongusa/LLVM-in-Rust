name: Differential Tests (LLVM 19)

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  stable:
    name: Stable build/test/bench checks
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-stable-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-stable-
            ${{ runner.os }}-cargo-

      - name: Stable workspace build (all targets)
        run: cargo +stable build --all-targets

      - name: Stable workspace tests
        run: cargo +stable test

      - name: Stable bench compile check
        run: cargo +stable bench -p llvm-bench --no-run

  differential:
    name: Differential tests against LLVM 19
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install stable nightly
          rustup default nightly

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install LLVM 19 and Clang 19
        run: |
          sudo apt-get update -y
          sudo apt-get install -y llvm-19 clang-19 binutils
          # Create unversioned symlinks so find_llvm_bin() resolves them
          sudo update-alternatives --install /usr/bin/llvm-as llvm-as \
            /usr/lib/llvm-19/bin/llvm-as 100
          sudo update-alternatives --install /usr/bin/llvm-objdump llvm-objdump \
            /usr/lib/llvm-19/bin/llvm-objdump 100
          sudo update-alternatives --install /usr/bin/clang clang \
            /usr/bin/clang-19 100
          # Verify installation
          llvm-as --version
          llvm-objdump --version
          clang --version

      - name: Run differential tests (ZERO skips enforced)
        env:
          REQUIRE_LLVM: "1"
        run: cargo test -p llvm-ir-parser differential --no-fail-fast -- --nocapture

      - name: Run regression hash check
        env:
          REQUIRE_LLVM: "1"
        run: cargo test -p llvm-ir-parser check_regression_hashes -- --nocapture

      - name: Run smoke oracle tests (ground truth vs LLVM 19)
        env:
          REQUIRE_LLVM: "1"
        run: cargo test -p llvm-ir-parser --test smoke --no-fail-fast -- --nocapture

      - name: Verify DWARF sections with llvm-dwarfdump
        env:
          REQUIRE_LLVM: "1"
        run: cargo +stable test -p llvm-codegen --test dwarf_line -- --nocapture
